<!-- This hidden page helps Netlify detect forms during deploy -->
<html>
<head><title>Forms</title></head>
<body>
  <form name="subscribe" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input name="form-name" type="hidden" value="subscribe" />
    <input name="bot-field" />
    <input name="email" type="email" />
    <input name="name" type="text" />
  </form>
  <form name="print-order" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input name="form-name" type="hidden" value="print-order" />
    <input name="bot-field" />
    <input name="name" type="text" />
    <input name="email" type="email" />
    <input name="address" />
    <input name="issue" />
  </form>
</body>
</html>
